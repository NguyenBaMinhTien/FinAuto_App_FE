name: FinAuto_App_FE
description: "Ứng dụng quản lý thu chi tiện lợi dành cho chủ cửa hàng"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Thư viện phông chữ cao cấp (Để hiển thị kiểu chữ Roboto Flex như thiết kế)
  google_fonts: ^6.1.0

  # Hỗ trợ định dạng tiền tệ và định dạng ngày tháng tiếng Việt (Ví dụ: 1.500.000đ)
  intl: ^0.19.0

# Khai báo tài nguyên ảnh (Asset images)
flutter:
  uses-material-design: true

  assets:
    - assets/images